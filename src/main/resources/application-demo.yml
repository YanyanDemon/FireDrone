spring:
  datasource:
    url: jdbc:h2:mem:firedrone;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=USER
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
  thymeleaf:
    cache: false

logging:
  level:
    com.firedrone: INFO
