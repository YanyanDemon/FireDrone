<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="canvas">
    <div class="contour-layer"></div>
    <div class="satellite-grid"></div>
    <svg class="drone-network" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
        <path class="flight-path" d="M 180 220 Q 320 150 450 240 T 680 180" fill="none" stroke="rgba(96,165,250,0.1)" stroke-width="1.2"/>
        <path class="flight-path" d="M 450 240 Q 530 340 720 290 T 950 220" fill="none" stroke="rgba(96,165,250,0.08)" stroke-width="1"/>
        <path class="flight-path" d="M 680 180 Q 820 200 920 140" fill="none" stroke="rgba(96,165,250,0.06)" stroke-width="1"/>
        <path class="flight-path" d="M 320 150 Q 380 90 540 120 T 820 100" fill="none" stroke="rgba(96,165,250,0.09)" stroke-width="1"/>
        <path class="flight-path" d="M 180 220 Q 260 340 380 360 T 580 420" fill="none" stroke="rgba(96,165,250,0.06)" stroke-width="1"/>
        <path class="flight-path" d="M 720 290 Q 860 340 1020 380 T 1200 320" fill="none" stroke="rgba(96,165,250,0.07)" stroke-width="1"/>
        <path class="flight-path" d="M 540 120 Q 640 60 780 80 T 1020 60" fill="none" stroke="rgba(96,165,250,0.05)" stroke-width="1"/>
    </svg>
    <div class="data-point" style="top:24%;left:12%;"></div>
    <div class="data-point" style="top:16%;left:22%;animation-delay:0.4s;"></div>
    <div class="data-point" style="top:26%;left:31%;animation-delay:0.8s;"></div>
    <div class="data-point" style="top:20%;left:47%;animation-delay:1.2s;"></div>
    <div class="data-point" style="top:32%;left:50%;animation-delay:0.6s;"></div>
    <div class="data-point" style="top:10%;left:56%;animation-delay:1.6s;"></div>
    <div class="data-point" style="top:22%;left:64%;animation-delay:0.3s;"></div>
    <div class="data-point" style="top:40%;left:26%;animation-delay:1.0s;"></div>
    <div class="data-point" style="top:44%;left:58%;animation-delay:1.4s;"></div>
    <div class="data-point" style="top:14%;left:70%;animation-delay:0.7s;"></div>
    <div class="data-point" style="top:36%;left:82%;animation-delay:1.1s;"></div>
    <div class="drone-silhouette" style="top:22%;left:11%;transform:rotate(-15deg);"></div>
    <div class="drone-silhouette" style="top:14%;left:21%;transform:rotate(25deg);"></div>
    <div class="drone-silhouette" style="top:24%;left:30%;transform:rotate(-8deg);"></div>
    <div class="drone-silhouette" style="top:18%;left:46%;transform:rotate(40deg);"></div>
    <div class="drone-silhouette" style="top:30%;left:49%;transform:rotate(-30deg);"></div>
    <div class="drone-silhouette" style="top:8%;left:55%;transform:rotate(12deg);"></div>
    <div class="drone-silhouette" style="top:20%;left:63%;transform:rotate(-22deg);"></div>
    <div class="drone-silhouette" style="top:38%;left:25%;transform:rotate(35deg);"></div>
    <div class="drone-silhouette" style="top:42%;left:57%;transform:rotate(-12deg);"></div>
    <div class="drone-silhouette" style="top:34%;left:81%;transform:rotate(18deg);"></div>
    <div class="hud-panel">
        <div class="hud-line hud-line-1"></div>
        <div class="hud-line hud-line-2"></div>
        <div class="hud-line hud-line-3"></div>
        <div class="hud-line hud-line-4"></div>
    </div>
    <div class="scanline"></div>
    <div class="noise"></div>
    <div class="vignette"></div>
</th:block>
</body>
</html>
