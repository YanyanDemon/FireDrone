<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head><title>无人机管理</title></head>
<body>
<div layout:fragment="content">
    <h2>无人机管理</h2>

    <!-- message -->
    <p style="color:#4ade80; font-weight: 500;" th:if="${msg}" th:text="${msg}"></p>

    <!-- add form -->
    <div style="background: var(--bg-card); border: 1px solid var(--border-card); border-radius: var(--radius-sm); padding: 18px 22px; margin-bottom: 24px;">
        <h3 style="margin:0 0 14px 0; font-size:15px; color:#f1f5f9;">+ 添加无人机</h3>
        <form th:action="@{/drone/add}" method="post" style="display:flex; flex-wrap:wrap; gap:10px; align-items:flex-end;">
            <div style="display:flex; flex-direction:column; gap:4px;">
                <label style="font-size:11px; color:#64748b;">名称</label>
                <input type="text" name="name" placeholder="无人机名称" required style="width:130px;">
            </div>
            <div style="display:flex; flex-direction:column; gap:4px;">
                <label style="font-size:11px; color:#64748b;">区域</label>
                <input type="text" name="area" placeholder="所属区域" required style="width:130px;">
            </div>
            <div style="display:flex; flex-direction:column; gap:4px;">
                <label style="font-size:11px; color:#64748b;">电量(%)</label>
                <input type="number" name="battery" value="100" min="0" max="100" style="width:80px;">
            </div>
            <div style="display:flex; flex-direction:column; gap:4px;">
                <label style="font-size:11px; color:#64748b;">最大载重(kg)</label>
                <input type="number" name="maxLoad" value="5.0" step="0.1" style="width:80px;">
            </div>
            <div style="display:flex; flex-direction:column; gap:4px;">
                <label style="font-size:11px; color:#64748b;">面具容量</label>
                <input type="number" name="maskCapacity" value="10" min="1" style="width:80px;">
            </div>
            <button class="btn btn-blue" type="submit">添加</button>
        </form>
    </div>

    <!-- table -->
    <table>
        <tr>
            <th>ID</th><th>名称</th><th>区域</th><th>电量</th><th>最大载重</th><th>面具容量</th><th>状态</th>
        </tr>
        <tr th:each="d : ${droneList}">
            <td th:text="${d.id}"></td>
            <td th:text="${d.name}"></td>
            <td th:text="${d.area}"></td>
            <td th:text="${d.battery} + '%'"></td>
            <td th:text="${d.maxLoad} + ' kg'"></td>
            <td th:text="${d.maskCapacity}"></td>
            <td th:text="${d.status}"></td>
        </tr>
        <tr th:if="${#lists.isEmpty(droneList)}">
            <td colspan="7" style="color:#64748b; padding:24px;">暂无无人机，请添加</td>
        </tr>
    </table>
</div>
</body>
</html>
