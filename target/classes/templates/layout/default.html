<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - FireDrone">FireDrone 指挥中心</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- bg-canvas -->
<div class="drone-canvas" aria-hidden="true" th:replace="~{fragments/bg-canvas :: canvas}"></div>

<!-- header -->
<header class="header">
    <div class="header-inner">
        <a th:href="@{/home}" class="header-brand">
            <span class="brand-icon">&#128752;</span>
            <span class="brand-text">FireDrone</span>
        </a>
        <span class="header-subtitle">火情智能监测与无人机配送系统</span>
        <div class="header-user" sec:authorize="isAuthenticated()">
            <span class="avatar" th:text="${#authentication.name.substring(0,1)}">A</span>
            <span class="user-name" th:text="${#authentication.name}">admin</span>
            <span class="user-role">
                <span sec:authorize="hasRole('ADMIN')">管理员</span>
                <span sec:authorize="!hasRole('ADMIN')">操作员</span>
            </span>
            <a th:href="@{/logout}" class="logout-btn">注销</a>
        </div>
    </div>
</header>

<nav class="nav">
    <div class="nav-inner">
        <a th:href="@{/home}" class="nav-link">&#127968; 首页</a>
        <a th:href="@{/monitor}" class="nav-link">&#128270; 火情监测</a>
        <a th:href="@{/alarm}" class="nav-link">&#128680; 告警管理</a>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/drone}" class="nav-link">&#128752; 无人机管理</a>
        <a th:href="@{/delivery}" class="nav-link">&#128230; 配送任务</a>
    </div>
</nav>

<!-- content slot -->
<div class="container" layout:fragment="content"></div>

</body>
</html>
